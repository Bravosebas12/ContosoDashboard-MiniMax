# =============================================================================
# ContosoDashboard — local development overrides.
# This file is auto-merged with docker-compose.yml by `docker compose` when no
# explicit `-f` flag is passed. It runs the app in Development mode and bind-
# mounts the source so you can iterate without rebuilding the image.
#
# Activate with:   docker compose --profile dev up
# Plain dev (no override):  docker compose -f docker-compose.yml up
# =============================================================================

services:
  app:
    profiles: ["dev", "default"]
    build:
      target: build          # build stage only — keeps `dotnet run` semantics
      args:
        BUILD_CONFIGURATION: Debug
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "https://+:8081;http://+:8080"
      # Hot-reload support: dotnet watch will recompile on file changes.
      DOTNET_WATCH: "true"
    # Run the SDK image in dev so `dotnet watch` is available.
    # Comment out `image:` override in docker-compose.yml if you prefer the
    # multi-stage to be the same container shape.
    command: ["dotnet", "watch", "run", "--no-launch-profile", "--urls", "http://+:8080"]
    ports:
      - "8080:8080"
      - "8081:8081"          # HTTPS in dev
    volumes:
      # Live source mount. Exclude bin/obj so the container's compiled output
      # is not clobbered by the host's.
      - ./ContosoDashboard:/src/ContosoDashboard
      - ./ContosoDashboard.slnx:/src/ContosoDashboard.slnx
      - contoso-uploads-dev:/app/AppData/uploads
    healthcheck:
      disable: true          # `dotnet watch` restarts the process, so HEALTHCHECK is unreliable here

  db:
    profiles: ["dev", "default"]
    # Expose the dev tools port to the host so you can connect with SSMS/AZ Data Studio.
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - contoso-db-data-dev:/var/opt/mssql
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro

  clamav:
    profiles: ["dev", "default"]
    # In dev, allow degraded mode (env var in app) so missing signatures do not block uploads.
    environment:
      CLAMAV_NO_FRESHCLAM: "1"     # avoid hitting the network on every dev startup
    volumes:
      - contoso-clamav-data-dev:/var/lib/clamav

volumes:
  contoso-uploads-dev:
    name: contoso-dashboard_uploads_dev
  contoso-db-data-dev:
    name: contoso-dashboard_db_dev
  contoso-clamav-data-dev:
    name: contoso-dashboard_clamav_dev
